<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maxiverse Editor</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="./images/gear.png">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <script src = "app.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="workspace">
      <div class="top-bar" role="banner">
        <div class="top-bar-brand">
          <div class="logo">
            <img src="./images/gear.png" alt="">
            <span>Maxiverse</span>
          </div>
          <div class="menu-bar">
          <div class="file-menu-container">
            <button type="button" class="menu-btn file-menu-btn" onclick="toggleFileMenu()" aria-haspopup="true" aria-expanded="false" aria-controls="file-dropdown">File</button>
            <div class="undo-menu" id="file-dropdown">
              <button class="undo-menu-item" onclick="saveProjectToFile()">Save</button>
              <button class="undo-menu-item" onclick="triggerLoadProjectFromFile()">Load</button>
              <button class="undo-menu-item" onclick="exportProjectAsHtml()">Export HTML</button>
            </div>
            <input id="file-input" type="file" accept=".json,.maxiverse,.app,application/json" style="display:none" />
          </div>
          <div class="edit-menu-container">
            <button type="button" class="menu-btn edit-menu-btn" onclick="toggleEditMenu()" aria-haspopup="true" aria-expanded="false" aria-controls="edit-dropdown">Edit</button>
            <div class="undo-menu" id="edit-dropdown">
              <button class="undo-menu-item" onclick="handleEditAction('undo')">Undo</button>
              <button class="undo-menu-item" onclick="handleEditAction('cut')">Cut</button>
              <button class="undo-menu-item" onclick="handleEditAction('copy')">Copy</button>
              <button class="undo-menu-item" onclick="handleEditAction('paste')">Paste</button>
              <button class="undo-menu-item" onclick="handleEditAction('selectAll')">Select All</button>
            </div>
          </div>
        </div>
        </div>
        <div class="asset-tabs" role="tablist" aria-label="Editor panels" title="Scroll tabs: mouse wheel here, or drag the bar under the tabs">
          <button type="button" class="asset-tab code-tab" role="tab" aria-selected="true">Code</button>
          <button type="button" class="asset-tab images-tab" role="tab" aria-selected="false">Images</button>
          <button type="button" class="asset-tab sound-tab" role="tab" aria-selected="false">Sound</button>
          <button type="button" class="asset-tab threed-tab" role="tab" aria-selected="false">3D</button>
        </div>
        <div class="profile-section">
          <button type="button" class="profile-photo-btn" title="Profile" aria-label="Profile">
            <img src="./images/gear.png" alt="" class="profile-photo" width="28" height="28">
          </button>
          <button type="button" class="play-btn" id="topbar-play" title="Play (run) / Stop" aria-label="Play or stop"></button>
        </div>
      </div>
      <div id="node-window" tabindex="0"></div>
    </div>
    <div class="stage">
      <canvas id="game-window"></canvas>
    </div>
    <div class ="objects" id ="object-window">
      <div class ="grid" id ="grid"></div>
    </div>
  </div>
    
    
</body>
</html>
